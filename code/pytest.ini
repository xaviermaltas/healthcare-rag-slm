[pytest]
# Directori arrel dels tests
testpaths = src/test

# Convencions de noms de fitxers i funcions de test
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Afegir el directori arrel al PYTHONPATH perquè els imports funcionin
pythonpath = .

# Opcions per defecte: verbose + mostra els prints
addopts = -v -s

# Markers personalitzats per filtrar tests
markers =
    unit: tests unitaris (sense dependències externes)
    integration: tests d'integració (requereix Docker actiu)
    slow: tests lents (descarreguen models, etc.)

# Configuració d'asyncio per tests async
asyncio_mode = auto
